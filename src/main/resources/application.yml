spring:
  application:
    name: work-kg-backend
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 110MB
  datasource:
    url: сpostgres-ocni.railway.internal:5432/railway
    username: postgres
    password: anMlAeHYKVPiHUyKasXASQfBCtWSslDJ
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      max-lifetime: 600000        # уменьшить до 10 минут
      idle-timeout: 300000        # уменьшить до 5 минут
      keepalive-time: 60000       # пинговать каждую минуту — добавить это
      validation-timeout: 5000
      connection-test-query: SELECT 1
      auto-commit: true
      pool-name: WorkKG-HikariPool
      register-mbeans: true
      data-source-properties:
        cachePrepStmts: true
        prepStmtCacheSize: 250
        prepStmtCacheSqlLimit: 2048

  jpa:
    hibernate:
      JDBC:
        time_zone: Asia/Bishkek
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 20
          fetch_size: 50
          order_inserts: true
          order_updates: true
          batch_versioned_data: true
          cache:
            use_second_level_cache: false
            use_query_cache: false

            # Статистика (выключить в продакшене)
            generate_statistics: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:migration

  jackson:
    time-zone: Asia/Bishkek
    date-format: yyyy-MM-dd'T'HH:mm:ss

server:
  port: 8080
  tomcat:
    threads:
      max: 200          # Максимум потоков
      min-spare: 10     # Минимум свободных потоков
    max-connections: 10000  # Максимум TCP соединений
    accept-count: 100       # Очередь запросов
    connection-timeout: 20000

